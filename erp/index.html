<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Indian Velox - Professional Accounting</title>
    <style>
        :root { --vyapar-blue: #1a252f; --vyapar-orange: #e67e22; --vyapar-bg: #f0f3f7; --success: #27ae60; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--vyapar-bg); display: flex; height: 100vh; }

        /* Vyapar Style Sidebar */
        .sidebar { width: 240px; background-color: var(--vyapar-blue); color: white; display: none; flex-direction: column; }
        .logo-section { padding: 25px; text-align: center; border-bottom: 1px solid #34495e; }
        .nav-item { padding: 15px 25px; cursor: pointer; border-left: 4px solid transparent; transition: 0.3s; color: #bdc3c7; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background: #2c3e50; color: white; border-left-color: var(--vyapar-orange); }

        /* Main Content */
        .content { flex: 1; padding: 30px; overflow-y: auto; display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #e1e8ed; }

        /* Form Elements */
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dcdfe6; border-radius: 8px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--vyapar-orange); }
        .btn-main { background: var(--vyapar-orange); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
        
        /* Stats Grid */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 20px; border-radius: 10px; text-align: center; border-left: 5px solid var(--vyapar-orange); }

        /* Login Screen */
        #login-screen { position: fixed; inset: 0; background: var(--vyapar-blue); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; color: #5f6368; }
        td { padding: 12px; border-bottom: 1px solid #f1f3f4; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h1 style="color: var(--vyapar-orange); margin-bottom: 10px;">INDIAN VELOX</h1>
        <p style="color: #666; margin-bottom: 25px;">Accounting & Inventory Suite</p>
        <input type="text" id="userid" placeholder="User ID / Dealer ID">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-main" onclick="handleLogin()">Login to System</button>
    </div>
</div>

<nav class="sidebar" id="side">
    <div class="logo-section">
        <h2 style="color: var(--vyapar-orange)">VELOX <span style="color:white">ERP</span></h2>
    </div>
    <div class="nav-item active" id="n-sale" onclick="show('sale')">🛒 Sale / Invoicing</div>
    <div class="nav-item" id="n-ledger" onclick="show('ledger')">💰 Party Ledger</div>
    <div class="nav-item" id="n-stock" onclick="show('stock')">📦 Items / Stock</div>
    <div class="nav-item" id="n-hr" onclick="show('hr')">📅 HR & Attendance</div>
    <div style="margin-top: auto; padding: 20px;">
        <button onclick="location.reload()" style="background: #e74c3c; width: 100%; color:white; border:none; padding:10px; border-radius:5px;">Logout</button>
    </div>
</nav>

<main class="content" id="cont">
    <div id="sale" class="module active-mod">
        <div class="header"><h2>New Sale Invoice</h2></div>
        <div class="card">
            <input type="text" id="cust" placeholder="Party Name">
            <select id="item" onchange="calculate()">
                <option value="0">Select Product</option>
                <option value="404">ECO SERIES 20W40 UNS (900ML)</option>
                <option value="431">TURBO POWER 20W40 SN (900ML)</option>
                <option value="392">DEMON PRO 10W30 SN (800ML)</option>
                <option value="472">TURBO POWER 20W40 SN (1 LTR)</option>
                <option value="1659">ULTRA DRIVE PRO 5W30 SP (3.5L)</option>
                <option value="2179">MAX TORQUE SS 5W30 SP (3.5L)</option>
            </select>
            <input type="number" id="qty" placeholder="Quantity" oninput="calculate()">
            <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; margin: 15px 0;">
                <h3 style="color: var(--success)">Total Amount: ₹<span id="display-total">0.00</span></h3>
                <p style="font-size: 12px; color: #777;">GST 18% & HSN 27101980 Included</p>
            </div>
            <button class="btn-main" style="background: var(--success)" onclick="sendData('SYNC_BILL')">Save & Print Bill</button>
        </div>
    </div>

    <div id="ledger" class="module" style="display:none">
        <h2>Party Ledger (Khata)</h2>
        <div class="card">
            <input type="text" id="l-name" placeholder="Search Party Name">
            <input type="number" id="l-amt" placeholder="Payment Amount Received">
            <button class="btn-main" onclick="sendData('UPDATE_LEDGER')">Record Payment</button>
        </div>
    </div>
</main>

<script>
    const D_ID = "AKfycbxGrOgYixL18YdDzNv8ht9-f_4Wm3tO6dOQNL44i02gEYoVplf94bn3SBkOtCE3EcB3";
    const URL = "https://script.google.com/macros/s/" + D_ID + "/exec";

    function handleLogin() {
        const u = document.getElementById('userid').value.toLowerCase();
        const p = document.getElementById('password').value;
        // Access controls for Admin and Dealer
        if((u==='admin' && p==='velox@admin') || (u==='dealer_01' && p==='velox123')) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('side').style.display = 'flex';
            document.getElementById('cont').style.display = 'block';
        } else { alert("Bhai, Sahi details daalo!"); }
    }

    function show(id) {
        document.querySelectorAll('.module').forEach(m => m.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        document.getElementById('n-'+id).classList.add('active');
    }

    function calculate() {
        const rate = parseFloat(document.getElementById('item').value);
        const q = parseFloat(document.getElementById('qty').value) || 0;
        document.getElementById('display-total').innerText = (rate * q).toFixed(2);
    }

    async function sendData(act) {
        const d = {
            action: act,
            user: document.getElementById('userid').value,
            customer: document.getElementById('cust').value,
            item: document.getElementById('item').options[document.getElementById('item').selectedIndex].text,
            qty: document.getElementById('qty').value,
            total: document.getElementById('display-total').innerText,
            amt: document.getElementById('l-amt').value
        };
        
        try {
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
            alert("✅ Data Synced to Velox Cloud!");
            location.reload();
        } catch(e) { alert("Error!"); }
    }
</script>
</body>
</html>
