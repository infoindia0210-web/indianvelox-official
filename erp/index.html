<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Indian Velox - Integrated ERP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-container">
        <div class="login-card">
            <h2>INDIAN VELOX ERP</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()">Login</button>
        </div>
    </div>

    <div id="erp-dashboard" style="display: none;">
        <div class="sidebar">
            <h2 class="brand">VELOX <span>ERP</span></h2>
            <button onclick="showModule('billing')">🧾 Billing & GST</button>
            <button onclick="showModule('inventory')">📦 Inventory & Products</button>
            <button onclick="showModule('hrms')">👥 Staff (HRMS)</button>
            <button onclick="showModule('dealers')">🤝 Dealer Management</button>
            <button onclick="location.reload()" class="logout-btn">Logout</button>
        </div>

        <div class="content">
            <div id="billing-module" class="module">
                <h3>New GST Invoice</h3>
                <div class="card">
                    <input type="text" id="cust_name" placeholder="Dealer/Customer Name">
                    <select id="prod_select" onchange="updateTotal()">
                        <option value="2500">Velox 20W40 Eco (₹2500)</option>
                        <option value="4200">Velox 5W30 Synth (₹4200)</option>
                    </select>
                    <input type="number" id="qty" placeholder="Qty" oninput="updateTotal()">
                    <div class="result">Total: ₹<span id="grand_total">0</span></div>
                    <button onclick="saveData('ADD_SALE')">Generate & Sync Bill</button>
                </div>
            </div>

            <div id="inventory-module" class="module" style="display:none;">
                <h3>Add New Product</h3>
                <div class="card">
                    <input type="text" id="p_name" placeholder="Product Name">
                    <input type="number" id="p_stock" placeholder="Initial Stock">
                    <button onclick="saveData('ADD_PRODUCT')">Add to Warehouse</button>
                </div>
            </div>

            <div id="hrms-module" class="module" style="display:none;">
                <h3>Add Staff Member</h3>
                <div class="card">
                    <input type="text" id="s_name" placeholder="Staff Name">
                    <input type="text" id="s_role" placeholder="Role (Driver/Sales)">
                    <input type="number" id="s_sal" placeholder="Monthly Salary">
                    <button onclick="saveData('ADD_STAFF')">Save Staff</button>
                </div>
            </div>

            <div id="dealers-module" class="module" style="display:none;">
                <h3>Register New Dealer</h3>
                <div class="card">
                    <input type="text" id="d_name" placeholder="Dealer Shop Name">
                    <input type="text" id="d_loc" placeholder="City/Location">
                    <input type="text" id="d_phone" placeholder="Contact Number">
                    <button onclick="saveData('ADD_DEALER')">Register Dealer</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
